name: Build Champions Battle Logger APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required SDK components
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools" 2>&1 | tail -5

      - name: Build release APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          # Generate wrapper first
          gradle wrapper --gradle-version=8.11.1
          # Build
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK (debug key)
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          BUILD_TOOLS="$ANDROID_HOME/build-tools/35.0.0"
          # Generate a debug keystore and sign
          keytool -genkey -v -keystore debug.keystore -storepass android \
            -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug, O=Android, C=US" 2>/dev/null
          # Align
          "$BUILD_TOOLS/zipalign" -v -p 4 \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            app/build/outputs/apk/release/ChampionsBattleLogger.apk 2>&1 | tail -3
          # Sign
          "$BUILD_TOOLS/apksigner" sign --ks debug.keystore --ks-pass pass:android \
            --ks-key-alias androiddebugkey --key-pass pass:android \
            app/build/outputs/apk/release/ChampionsBattleLogger.apk 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ChampionsBattleLogger-APK
          path: app/build/outputs/apk/release/ChampionsBattleLogger.apk
          if-no-files-found: error

      - name: List outputs
        run: ls -lh app/build/outputs/apk/release/
